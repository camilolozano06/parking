<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Parqueadero</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>

        <img
            src="logo.png"
            alt="Logo Parqueadero"
            class="logo">

        <div>
            <h1>Sistema Parqueadero</h1>
            <p id="fechaHora"></p>
        </div>

    </header>

    <div class="container">

        <input
            type="text"
            id="placa"
            placeholder="Ingrese la placa">

        <div class="botones">

    <button onclick="ingresarVehiculo()">
        Ingresar Vehículo
    </button>

    <button onclick="salirVehiculo()" class="btn-salir">
        Salir Vehículo
    </button>

    </div>

        <h2>Vehículos Activos</h2>

        <table>

            <thead>

                <tr>
                    <th>Placa</th>
                    <th>Tipo</th>
                    <th>Hora ingreso</th>
                </tr>

            </thead>

            <tbody id="tablaActivos">

            </tbody>

        </table>

        <h2>Historial de Salidas</h2>

        <table>

            <thead>

                <tr>
                    <th>Placa</th>
                    <th>Tipo</th>
                    <th>Hora ingreso</th>
                    <th>Hora salida</th>
                    <th>Total</th>
                </tr>

            </thead>

            <tbody id="tablaHistorial">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
