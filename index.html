<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Parqueadero</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <img src="logo.png" alt="Logo Parqueadero" class="logo">

    <div>
        <h1>Sistema Parqueadero</h1>
        <p id="fechaHora"></p>
    </div>
</header>

<div class="container">

    <div class="dashboard">
        <div class="card">
            <h3>🚗 Carros activos</h3>
            <p id="totalCarros">0</p>
        </div>

        <div class="card">
            <h3>🏍️ Motos activas</h3>
            <p id="totalMotos">0</p>
        </div>

        <div class="card">
            <h3>💰 Recaudo total</h3>
            <p id="recaudoTotal">$0</p>
        </div>

        <div class="card">
            <h3>🅿️ Activos</h3>
            <p id="ocupacion">0</p>
        </div>
    </div>

    <input type="text" id="placa" placeholder="Ingrese la placa">

    <div class="botones">
        <button onclick="ingresarVehiculo()">Ingresar Vehículo</button>
        <button onclick="salirVehiculo()" class="btn-salir">Salir Vehículo</button>
    </div>

    <div class="buscador">
        <input type="text" id="buscarPlaca" placeholder="🔍 Buscar historial por placa">
        <button onclick="buscarHistorialPlaca()" class="btn-buscar">Buscar</button>
    </div>

    <div id="resultadoBusqueda" class="resultado-busqueda"></div>

    <h2>Vehículos Activos</h2>

    <table>
        <thead>
            <tr>
                <th>Placa</th>
                <th>Tipo</th>
                <th>Hora ingreso</th>
            </tr>
        </thead>
        <tbody id="tablaActivos"></tbody>
    </table>

    <h2>Historial por Día</h2>

    <div class="filtro-fecha">
        <label for="fechaFiltro">📅 Seleccionar fecha:</label>
        <input type="date" id="fechaFiltro" onchange="filtrarHistorialPorFecha()">
    </div>

    <div class="resumen-dia">
        <div>
            <h3>Vehículos del día</h3>
            <p id="vehiculosDia">0</p>
        </div>

        <div>
            <h3>Carros</h3>
            <p id="carrosDia">0</p>
        </div>

        <div>
            <h3>Motos</h3>
            <p id="motosDia">0</p>
        </div>

        <div>
            <h3>Recaudo día</h3>
            <p id="recaudoDia">$0</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Día</th>
                <th>Hora ingreso</th>
                <th>Hora salida</th>
                <th>Placa</th>
                <th>Tipo</th>
                <th>Tiempo</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="tablaHistorial"></tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
